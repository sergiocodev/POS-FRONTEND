<div class="card border-0">
    <!-- Table Header -->
    <div class="card-header bg-transparent border-bottom py-3" *ngIf="title || showAddButton">
        <div class="d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <i *ngIf="icon" [class]="icon + ' me-2 text-primary fs-5'"></i>
                <h5 class="mb-0 fw-bold text-dark">{{ title }}</h5>
            </div>
            <div class="d-flex gap-2">
                <ng-content select="[tableActions]"></ng-content>
                <button *ngIf="showAddButton" class="btn btn-primary btn-sm d-flex align-items-center rounded-2 px-3"
                    (click)="onAdd.emit()">
                    <i class="bi bi-plus-lg me-1"></i> {{ addButtonLabel }}
                </button>
            </div>
        </div>
    </div>

    <div class="table-responsive">

        <table class="table align-middle mb-0" [ngClass]="tableClass">

            <thead class="border-bottom">
                <tr>
                    <th *ngFor="let col of columns" scope="col" class="fw-semibold text-secondary py-3"
                        [style.width]="col.width || 'auto'"
                        [ngClass]="col.align ? 'text-' + (col.align === 'right' ? 'end' : (col.align === 'left' ? 'start' : col.align)) : ''">
                        {{ col.label }}
                    </th>
                </tr>

                <tr *ngIf="hasFilterableColumns">
                    <th *ngFor="let col of columns" class="p-2 border-0">
                        <input *ngIf="col.filterable" type="text"
                            class="form-control form-control-sm shadow-none border" [placeholder]="'Buscar...'"
                            [(ngModel)]="filterValues[col.key]" (ngModelChange)="onFilterUIChange()">
                    </th>
                </tr>
            </thead>

            <tbody>
                <tr *ngFor="let row of paginatedData; let i = index" class="border-bottom">
                    <td *ngFor="let col of columns" class="py-3"
                        [ngClass]="col.align ? 'text-' + (col.align === 'right' ? 'end' : (col.align === 'left' ? 'start' : col.align)) : ''">

                        <ng-container [ngSwitch]="col.type || 'text'">

                            <span *ngSwitchCase="'index'" class="text-muted small fw-medium">
                                {{ (currentPage - 1) * pageSize + i + 1 }}
                            </span>

                            <span *ngSwitchCase="'text'">
                                {{ getValue(row, col) }}
                            </span>

                            <div *ngSwitchCase="'html'" [innerHTML]="getValue(row, col)"></div>

                            <div *ngSwitchCase="'image'" style="width: 40px; height: 40px;"
                                [ngClass]="{'mx-auto': col.align === 'center', 'ms-auto': col.align === 'right'}">
                                <img [src]="row[col.key] || 'assets/placeholder.png'"
                                    class="w-100 h-100 rounded-circle object-fit-cover bg-light border">
                            </div>

                            <span *ngSwitchCase="'badge'" class="badge rounded-pill fw-normal"
                                [ngClass]="col.classCallback ? col.classCallback(row[col.key], row) : 'bg-secondary'">
                                {{ getValue(row, col) }}
                            </span>

                            <div *ngSwitchCase="'tags'" class="d-flex flex-wrap gap-1"
                                [ngClass]="{'justify-content-center': col.align === 'center', 'justify-content-end': col.align === 'right'}">
                                <span *ngFor="let tag of (col.tagsCallback ? col.tagsCallback(row) : [])"
                                    class="badge rounded-1 fw-normal" [ngClass]="tag.class">
                                    {{ tag.label }}
                                </span>
                            </div>

                            <div *ngSwitchCase="'toggle'" class="form-check form-switch d-inline-block">
                                <input class="form-check-input" type="checkbox" role="switch" [checked]="row[col.key]"
                                    style="cursor: pointer;"
                                    (change)="onToggle.emit({row: row, key: col.key, checked: $any($event.target).checked})">
                            </div>

                            <div *ngSwitchCase="'action'" class="d-flex gap-2"
                                [ngClass]="{'justify-content-center': col.align === 'center', 'justify-content-end': col.align === 'right'}">
                                <!-- Botones Personalizados -->
                                <ng-container *ngIf="row['actions'] && row['actions'].length > 0">
                                    <button *ngFor="let act of row['actions']"
                                        class="btn-action d-flex align-items-center justify-content-center"
                                        [ngClass]="act.class || ''" (click)="onAction.emit({action: act.id, row: row})"
                                        [title]="act.title || ''">
                                        <i class="bi" [ngClass]="act.icon"></i>
                                    </button>
                                </ng-container>

                                <!-- Botones por Defecto (si no hay acciones personalizadas) -->
                                <ng-container *ngIf="!row['actions'] || row['actions'].length === 0">
                                    <button *ngIf="row['permissionCount'] !== undefined" class="btn-action"
                                        (click)="onAction.emit({action: 'permissions', row: row})"
                                        title="Gestionar permisos">
                                        <i class="bi bi-key"></i>
                                    </button>
                                    <button class="btn-action btn-edit"
                                        (click)="onAction.emit({action: 'edit', row: row})" title="Editar">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button class="btn-action btn-delete"
                                        (click)="onAction.emit({action: 'delete', row: row})" title="Eliminar">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </ng-container>
                            </div>

                            <ng-container *ngSwitchCase="'template'">
                                <ng-container *ngTemplateOutlet="col.templateRef; context: { $implicit: row }">
                                </ng-container>
                            </ng-container>

                        </ng-container>
                    </td>
                </tr>

                <tr *ngIf="paginatedData.length === 0">
                    <td [attr.colspan]="columns.length" class="text-center py-5 text-muted">
                        No se encontraron registros
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="card-footer border-top-0 py-3" *ngIf="isServerSide ? totalElements > 0 : filteredData.length > 0">
        <div class="d-flex justify-content-between align-items-center">
            <small class="text-muted">
                {{ isServerSide ? totalElements : filteredData.length }} registros en total
            </small>

            <div class="d-flex align-items-center gap-4">
                <!-- Page Size Selector -->
                <div class="d-flex align-items-center gap-2">
                    <small class="text-muted">Filas por página:</small>
                    <app-custom-select
                        [options]="pageSizeOptions"
                        [value]="pageSize"
                        customClass="page-size-select"
                        (selectionChange)="onPageSizeSelectChange($event)">
                    </app-custom-select>
                </div>

                <!-- Pagination -->
                <ul class="pagination pagination-sm mb-0" *ngIf="totalPages > 1">
                    <li class="page-item" [class.disabled]="currentPage === 1">
                        <button class="page-link border-0 text-dark ripple" (click)="changePage(currentPage - 1)">
                            <i class="bi bi-chevron-left"></i>
                        </button>
                    </li>
                    <li class="page-item" *ngFor="let p of visiblePages" [class.active]="p === currentPage"
                        [class.disabled]="p === '...'">
                        <button class="page-link border-0 rounded mx-1" (click)="changePage(p)">
                            {{ p }}
                        </button>
                    </li>
                    <li class="page-item" [class.disabled]="currentPage === totalPages">
                        <button class="page-link border-0 text-dark ripple" (click)="changePage(currentPage + 1)">
                            <i class="bi bi-chevron-right"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>

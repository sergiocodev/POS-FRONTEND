<div class="position-relative">
    <button
        class="btn bg-body-tertiary w-100 d-flex justify-content-between align-items-center border rounded-2 py-2 shadow-none"
        type="button" (click)="toggleDropdown()">
        <span [class.text-body]="selectedOption() !== null" [class.text-secondary]="selectedOption() === null"
            class="fw-medium">
            {{ displayText() }}
        </span>
        <i class="bi" [class.bi-chevron-down]="!isOpen()" [class.bi-chevron-up]="isOpen()"
            [class.text-primary]="isOpen()" [class.text-secondary]="!isOpen()">
        </i>
    </button>

    @if (isOpen()) {
    <div class="dropdown-menu show w-100 mt-1 shadow-sm border rounded-2 position-absolute z-3 p-0">

        <div class="border-bottom p-2 d-flex align-items-center">
            <i class="bi bi-search text-secondary ms-2"></i>
            <input type="text" class="form-control border-0 shadow-none bg-transparent ms-2 text-secondary"
                [placeholder]="searchPlaceholder()" [(ngModel)]="searchTerm" (click)="$event.stopPropagation()" />
        </div>

        <ul class="list-unstyled mb-0 overflow-y-auto" style="max-height: 250px;">
            @for (option of filteredOptions(); track option.id) {
            <li>
                <button class="dropdown-item py-2 px-3 text-secondary" (click)="selectOption(option)">
                    {{ option.label }}
                </button>
            </li>
            } @empty {
            <li class="p-4 text-center">
                <span class="fst-italic text-secondary">
                    {{ emptyMessage() }}
                </span>
            </li>
            }
        </ul>
    </div>
    }
</div>

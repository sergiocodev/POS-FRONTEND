<div class="flex-grow-1 position-relative" style="min-height: 50vh;">
    <div class="position-absolute top-0 start-0 w-100 h-100 overflow-auto scrollable-content ps-2 pt-2 pe-2 pb-4">

        <!-- Loading Skeleton -->
        <div *ngIf="isLoading" class="row row-cols-2 row-cols-md-3 row-cols-xl-4 g-3">
            <div class="col" *ngFor="let i of [1,2,3,4,5,6,7,8]">
                <div class="card h-100 border-0 rounded-4 skeleton-card">
                    <div class="card-body p-3">
                        <div class="skeleton-img mx-auto mb-3"></div>
                        <div class="skeleton-line w-75 mx-auto mb-2"></div>
                        <div class="skeleton-line w-50 mx-auto mb-2"></div>
                        <div class="skeleton-line w-60 mx-auto"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Product Grid -->
        <div *ngIf="!isLoading" class="row row-cols-2 row-cols-md-3 row-cols-xl-4 g-3">
            <div class="col" *ngFor="let prod of products">
                <div class="product-card" (click)="onProductClick(prod)" tabindex="0" role="button">

                    <!-- Floating Location Badge -->
                    <div *ngIf="prod.locationShelf" class="location-badge" [title]="'Ubicación: ' + prod.locationShelf">
                        <i class="bi bi-geo-alt-fill"></i>
                        <span>{{ prod.locationShelf }}</span>
                    </div>

                    <!-- Image Section -->
                    <div class="card-img-section">
                        <div class="img-wrapper">
                            <img *ngIf="prod.imageUrl" [src]="prod.imageUrl" class="product-img" [alt]="prod.tradeName"
                                (error)="$any($event.target).style.display = 'none'">
                            <div *ngIf="!prod.imageUrl" class="img-placeholder">
                                <i class="bi bi-capsule"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Info Section -->
                    <div class="card-info-section">
                        <h6 class="product-name" [title]="prod.tradeName">
                            {{ prod.tradeName }}
                        </h6>
                        <span class="generic-name" *ngIf="prod.genericName">
                            {{ prod.genericName }}
                        </span>
                        <span class="presentation-tag" *ngIf="prod.presentation">
                            {{ prod.presentation }}
                        </span>
                    </div>

                    <!-- Footer Section -->
                    <div class="card-footer-section">
                        <div class="price-row">
                            <span class="price">S/ {{ prod.salesPrice | number:'1.2-2' }}</span>
                            <span class="stock-badge" [ngClass]="getStockClass(prod.stock)">
                                {{ prod.stock }}
                            </span>
                        </div>
                        <div *ngIf="prod.expirationDate" class="expiration-row"
                            [ngClass]="getExpirationClass(prod.expirationDate)">
                            <i class="bi bi-clock-history"></i>
                            <span>{{ getDaysToExpire(prod.expirationDate) }} días</span>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div *ngIf="!isLoading && products.length === 0" class="empty-state">
            <div class="empty-state-icon">
                <i class="bi bi-search"></i>
            </div>
            <h5>No se encontraron productos</h5>
            <p>Intenta con otro término de búsqueda.</p>
        </div>

    </div>
</div>

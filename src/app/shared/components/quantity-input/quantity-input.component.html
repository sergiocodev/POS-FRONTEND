<div class="w-100" [class.opacity-50]="disabled">
    <div *ngIf="label" class="text-muted fw-bold mb-1 text-truncate"
        style="font-size: 0.65rem; text-transform: uppercase;">
        {{ label }}
    </div>

    <div class="btn-group btn-group-sm quantity-container rounded-3 border w-100"
        style="height: 26px;">

        <button *ngIf="showControls" type="button" class="btn btn-qty px-2 py-0 text-muted fw-bold border-0"
            (click)="decrement()" [disabled]="value <= min || disabled">-</button>

        <input type="number" class="px-1 fw-bold text-center border-0 w-100 custom-number-input"
            [class.border-start]="showControls" [class.border-end]="showControls"
            [value]="value"
            [step]="allowManual ? 'any' : step" [readonly]="!allowManual || !showControls || disabled"
            (change)="onManualInput($event)" (input)="onManualInput($event)"
            (keydown.enter)="$event.preventDefault()">

        <button *ngIf="showControls" type="button" class="btn btn-qty px-2 py-0 text-muted fw-bold border-0"
            (click)="increment()" [disabled]="value >= max || disabled">+</button>
    </div>
</div>

<div class="summary-container">
    @if (title) {
    <div class="summary-title">{{ title }}</div>
    }
    <div class="summary-cards">
        @for (item of items; track item.label) {
        <div class="summary-card" [ngClass]="item.cssClass">
            <div class="card-icon">{{ item.icon }}</div>
            <div class="card-info">
                <span class="card-label">{{ item.label }}</span>
                <span class="card-value">
                    @if (item.isCurrency) {
                        {{ item.value | currency: currencyCode : currencySymbol }}
                    } @else {
                        {{ item.value }}
                    }
                </span>
                @if (item.subtitle) {
                    <span class="card-subtitle mt-1 d-block text-muted" [innerHTML]="item.subtitle"></span>
                }
            </div>
        </div>
        }
    </div>
</div>

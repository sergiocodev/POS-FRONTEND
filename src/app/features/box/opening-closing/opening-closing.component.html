<app-module-header title="Control de Caja" iconClass="bi bi-cash-coin">
</app-module-header>

<div class="container-fluid py-4">


    <app-summary-box></app-summary-box>

    <div *ngIf="!activeSession()" class="d-flex justify-content-end align-items-center gap-2 mb-4">
        <button class="btn btn-custom-primary shadow-sm" routerLink="/cash/registers">
            <i class="bi bi-gear-fill me-1"></i> Gestionar Cajas
        </button>

        <button class="btn btn-custom-primary shadow-sm" (click)="onOpenSession()">
            <i class="bi bi-door-open-fill me-1"></i> Abrir Caja
        </button>
    </div>

    <div class="row">
        <div [ngClass]="statusData() ? 'col-xl-8 col-lg-7' : 'col-12'">

            <app-session-list [sessions]="sessions()" [isLoading]="isLoading()" [totalItems]="totalItems()"
                [totalPages]="totalPages()" [currentPage]="currentPage()" [pageSize]="pageSize()"
                (pageChange)="onPageChange($event)" (pageSizeChange)="onPageSizeChange($event)">
            </app-session-list>
        </div>

        <div class="col-xl-4 col-lg-5" *ngIf="statusData()">
            <app-box-details [statusData]="statusData()" [activeSession]="activeSession()"
                (onCloseBox)="onCloseActiveSession()" (onViewMovements)="onViewMovements()"
                (registerInflow)="onRegisterInflow()" (registerOutflow)="onRegisterOutflow()">
            </app-box-details>
        </div>
    </div>

    <!-- Modal para Ingresos/Egresos rápidos -->
    <app-modal-generic [isVisible]="showMovementModal()"
        [title]="movementType() === 'inflow' ? 'Registrar Ingreso de Efectivo' : 'Registrar Egreso de Efectivo'"
        (close)="closeMovementModal()">
        @if (showMovementModal()) {
            <app-movement-form [movementType]="movementType()" (onSave)="onMovementSaved()" (onCancel)="closeMovementModal()">
            </app-movement-form>
        }
    </app-modal-generic>

    <!-- Modal para Abrir Caja -->
    <app-modal-generic [isVisible]="showOpenModal()" title="Apertura de Caja"
        (close)="closeOpenModal()">
        @if (showOpenModal()) {
            <app-cash-open (saved)="onOpenSaved()"></app-cash-open>
        }
    </app-modal-generic>
</div>

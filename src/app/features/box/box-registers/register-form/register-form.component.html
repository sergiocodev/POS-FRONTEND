<form *ngIf="!isLoading()" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div class="row g-3">

        <div class="col-12">
            <label for="name" class="form-label fw-semibold">
                Nombre de la Caja <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="name" formControlName="name"
                placeholder="Ej: Caja Principal 01"
                [class.is-invalid]="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
            <div class="invalid-feedback" *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
                <span *ngIf="registerForm.get('name')?.errors?.['required']">El nombre es requerido</span>
                <span *ngIf="registerForm.get('name')?.errors?.['maxlength']">Máximo 100 caracteres</span>
            </div>
        </div>


        <div class="col-12">
            <label for="establishmentId" class="form-label fw-semibold">
                Establecimiento <span class="text-danger">*</span>
            </label>
            <select class="form-select" id="establishmentId" formControlName="establishmentId"
                [class.is-invalid]="registerForm.get('establishmentId')?.invalid && registerForm.get('establishmentId')?.touched">
                <option [value]="null" disabled>Seleccione un establecimiento...</option>
                <option *ngFor="let est of establishments()" [value]="est.id">{{ est.name }}</option>
            </select>
            <div class="invalid-feedback" *ngIf="registerForm.get('establishmentId')?.invalid && registerForm.get('establishmentId')?.touched">
                <span *ngIf="registerForm.get('establishmentId')?.errors?.['required']">Debe seleccionar un establecimiento</span>
            </div>
        </div>

        <div class="col-12 mt-4">
            <div class="d-flex gap-2 justify-content-end flex-wrap">
                <button type="submit" class="btn btn-custom-primary" [disabled]="registerForm.invalid || isSaving()">
                    <span *ngIf="!isSaving()">
                        {{ isEdit() ? 'Actualizar Caja' : 'Guardar Caja' }}
                    </span>
                    <span *ngIf="isSaving()">
                        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                        Guardando...
                    </span>
                </button>
            </div>
        </div>
    </div>
</form>

<div *ngIf="isLoading()" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Cargando...</span>
    </div>
    <p class="mt-3 text-muted">Cargando datos de la caja...</p>
</div>

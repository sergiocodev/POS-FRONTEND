@if (isLoading()) {
<div class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Cargando...</span>
    </div>
</div>
} @else {
<form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-2">
    <div class="mb-3">
        <label for="name" class="form-label">
            Nombre <span class="text-danger">*</span>
        </label>
        <input type="text" class="form-control" id="name" formControlName="name"
            [class.is-invalid]="isFieldInvalid('name')" placeholder="Ej: Analgésico, Antibiótico...">
        @if (isFieldInvalid('name')) {
        <div class="invalid-feedback">
            {{ getFieldError('name') }}
        </div>
        }
    </div>

    <div class="mb-3">
        <label for="description" class="form-label">Descripción</label>
        <textarea class="form-control" id="description" formControlName="description" rows="2"
            [class.is-invalid]="isFieldInvalid('description')" placeholder="Opcional..."></textarea>
        @if (isFieldInvalid('description')) {
        <div class="invalid-feedback">
            {{ getFieldError('description') }}
        </div>
        }
    </div>



    <div class="d-flex gap-2 justify-content-end">
        <button type="submit" class="btn btn-custom-primary" [disabled]="isSaving() || form.invalid">
            @if (!isSaving()) {
                {{ isEditMode() ? 'Actualizar Acción' : 'Guardar Acción' }}
            }
            @if (isSaving()) {
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Guardando...
            }
        </button>
    </div>
</form>
}

@if (isLoading()) {
<div class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Cargando...</span>
    </div>
</div>
} @else {
<form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-2">
    <div class="mb-4">
        <label for="description" class="form-label">
            Descripción <span class="text-danger">*</span>
        </label>
        <input type="text" class="form-control" id="description" formControlName="description"
            [class.is-invalid]="isFieldInvalid('description')" placeholder="Ej: CAJA X 100 TAB, FRASCO X 100 ML...">
        @if (isFieldInvalid('description')) {
        <div class="invalid-feedback">
            {{ getFieldError('description') }}
        </div>
        }
    </div>

    <div class="d-flex gap-2 justify-content-end">
        <button type="submit" class="btn btn-custom-primary" [disabled]="isSaving() || form.invalid">
            @if (!isSaving()) {
                {{ isEditMode() ? 'Actualizar Presentación' : 'Guardar Presentación' }}
            }
            @if (isSaving()) {
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Guardando...
            }
        </button>
    </div>
</form>
}

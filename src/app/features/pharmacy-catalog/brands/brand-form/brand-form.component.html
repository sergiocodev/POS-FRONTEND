<div class="brand-form container-fluid py-2">
    @if (isLoading() && isEditMode()) {
    <div class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
        <p class="mt-3 text-muted">Cargando datos de la marca...</p>
    </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!isLoading() || !isEditMode()">
        <div class="row g-3">
            <div class="col-12">
                <label for="name" class="form-label fw-semibold">
                    Nombre <span class="text-danger">*</span>
                </label>
                <input type="text" class="form-control" id="name" formControlName="name"
                    [class.is-invalid]="isFieldInvalid('name')" placeholder="Ej: Genérico">
                @if (isFieldInvalid('name')) {
                <div class="invalid-feedback d-block">
                    {{ getFieldError('name') }}
                </div>
                }
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="d-flex gap-2 justify-content-end flex-wrap">
                    <button type="submit" class="btn btn-custom-primary" [disabled]="isSaving() || form.invalid">
                        <span *ngIf="!isSaving()">
                            {{ isEditMode() ? 'Actualizar Marca' : 'Guardar Marca' }}
                        </span>
                        <span *ngIf="isSaving()">
                            <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                            Guardando...
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>

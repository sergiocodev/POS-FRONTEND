<div class="brands-list-container animate-fade-in position-relative">

    <div class="card border-0 shadow-sm overflow-hidden">
        <app-custom-table [columns]="cols" [data]="brands" 
            [pageSize]="pageSize"
            [totalElements]="totalItems"
            [currentPage]="currentPage"
            (onAction)="handleTableAction($event)"
            (onPageChange)="pageChange.emit($event)"
            (onPageSizeChange)="pageSizeChange.emit($event)"
            (onFilterChange)="tableFilterChange.emit($event)">
        </app-custom-table>

        @if (isLoading) {
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>
        }
    </div>

</div>

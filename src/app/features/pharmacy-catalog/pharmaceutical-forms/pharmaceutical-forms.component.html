<app-confirm-modal></app-confirm-modal>
<app-modal-alert></app-modal-alert>
<app-module-header title="Formas Farmacéuticas" iconClass="bi bi-capsule"></app-module-header>

<div class="pharmaceutical-forms-page animate-fade-in">
    <app-pharmaceutical-form-list [pharmaceuticalForms]="pharmaceuticalForms()" [isLoading]="isLoading()"
        (create)="onOpenForm()" (edit)="onOpenForm($event)" (delete)="onDelete($event)">
    </app-pharmaceutical-form-list>

    <!-- Modal para Crear/Editar Forma Farmacéutica -->
    <app-modal-generic [isVisible]="showForm()" [title]="selectedFormId() ? 'Editar Forma' : 'Nueva Forma'" size="md"
        (close)="onFormCancelled()">
        <app-pharmaceutical-form-form *ngIf="showForm()" [formId]="selectedFormId()" (saved)="onFormSaved()"
            (cancelled)="onFormCancelled()">
        </app-pharmaceutical-form-form>
    </app-modal-generic>
</div>

<div class="active-ingredient-form container-fluid py-2">

    <div *ngIf="isLoading() && isEditMode()" class="text-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
        <p class="mt-3 text-muted">Cargando datos del principio activo...</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!isLoading() || !isEditMode()">
        <div class="row g-3">
            <div class="col-12">
                <label for="name" class="form-label fw-semibold">
                    Nombre <span class="text-danger">*</span>
                </label>
                <input type="text" class="form-control" id="name" formControlName="name"
                    [class.is-invalid]="name?.invalid && name?.touched" placeholder="Ej: Paracetamol">
                <div class="invalid-feedback d-block" *ngIf="name?.invalid && name?.touched">
                    <span *ngIf="name?.errors?.['required']">El nombre es requerido</span>
                    <span *ngIf="name?.errors?.['maxlength']">Máximo 200 caracteres</span>
                </div>
            </div>

            <div class="col-12">
                <label for="description" class="form-label fw-semibold">Descripción</label>
                <textarea class="form-control" id="description" formControlName="description" rows="3"
                    [class.is-invalid]="description?.invalid && description?.touched"
                    placeholder="Descripción del principio activo"></textarea>
                <div class="invalid-feedback d-block" *ngIf="description?.invalid && description?.touched">
                    <span *ngIf="description?.errors?.['maxlength']">Máximo 255 caracteres</span>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <div class="d-flex gap-2 justify-content-end flex-wrap">
                    <button type="submit" class="btn btn-custom-primary"
                        [disabled]="isSaving() || form.invalid">
                        <span *ngIf="!isSaving()">
                            {{ isEditMode() ? 'Actualizar Principio Activo' : 'Guardar Principio Activo' }}
                        </span>
                        <span *ngIf="isSaving()">
                            <span class="spinner-border spinner-border-sm me-2" role="status"
                                aria-hidden="true"></span>
                            Guardando...
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </form>

</div>

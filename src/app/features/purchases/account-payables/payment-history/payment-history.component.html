<div class="history-container" *ngIf="selectedPayable">
    <div class="d-flex flex-column gap-3 mb-4">
        <div class="premium-summary-card">
            <div class="client-info">
                <div class="avatar-circle">
                    <i class="bi bi-person-fill"></i>
                </div>
                <div class="details">
                    <h6>Proveedor</h6>
                    <h4>{{ selectedPayable.supplierName }}</h4>
                    <p><i class="bi bi-receipt"></i> Compra ID: {{ selectedPayable.purchaseId }}</p>
                </div>
            </div>
            <div class="amount-info">
                <h6>Monto Total</h6>
                <h2>S/ {{ selectedPayable.totalAmount | number:'1.2-2' }}</h2>
            </div>
        </div>

        <div class="premium-summary-card danger-card">
            <div class="client-info">
                <div class="avatar-circle text-danger">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                </div>
                <div class="details">
                    <h6>Estado Actual</h6>
                    <h4 class="text-danger">Por Pagar</h4>
                </div>
            </div>
            <div class="amount-info danger-amount">
                <h6 class="text-danger">Saldo Pendiente</h6>
                <h2>S/ {{ selectedPayable.pendingBalance | number:'1.2-2' }}</h2>
            </div>
        </div>
    </div>

    <div class="text-center p-4" *ngIf="isLoadingHistory()">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
    </div>

    <div class="mt-3" *ngIf="!isLoadingHistory()">
        <app-custom-table 
            [columns]="historyColumns" 
            [data]="paymentHistory()">
        </app-custom-table>
    </div>

    <div class="d-flex justify-content-end mt-3">
        <button type="button" class="btn btn-secondary rounded-pill px-4" (click)="closeHistoryModal()">
            Cerrar
        </button>
    </div>
</div>

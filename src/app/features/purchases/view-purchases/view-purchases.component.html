<div class="module-header">
    <app-module-header title="Ver Compras" iconClass="bi-bag"></app-module-header>
</div>

<div class="container-fluid px-4">
    <div class="row">
        <div class="col-12">
            <div class="card border shadow-sm my-4">
                <div class="card-body p-3">
                    <app-date-range-search (filterChange)="handleDateFilter($event)"></app-date-range-search>
                </div>
            </div>
        </div>
    </div>

    <!-- Purchases Summary -->
    <div class="row">
        <div class="col-12">
            <app-summary-cards title="RESUMEN" [items]="summaryItems()">
            </app-summary-cards>
        </div>
    </div>

    <app-purchase-list [purchases]="purchases()" [isLoading]="isLoading()" [totalItems]="totalItems()" [totalPages]="totalPages()"
        [currentPage]="currentPage()" [pageSize]="pageSize()" (pageChange)="handlePageChange($event)"
        (pageSizeChange)="handlePageSizeChange($event)" (tableFilterChange)="handleTableFilter($event)"
        (viewDetail)="onViewDetails($event)" (cancelPurchase)="onCancelPurchase($event)">
    </app-purchase-list>
</div>

<!-- Purchase Detail Modal -->
<app-modal-generic [title]="'Detalle de Compra'" [isVisible]="isDetailVisible()" [size]="'xl'"
    (close)="isDetailVisible.set(false)">
    <app-purchase-detail *ngIf="selectedPurchase()" [purchase]="selectedPurchase()" (actionSuccess)="loadPurchases()"
        (cancel)="onCancelPurchase($event)" (close)="isDetailVisible.set(false)">
    </app-purchase-detail>
</app-modal-generic>

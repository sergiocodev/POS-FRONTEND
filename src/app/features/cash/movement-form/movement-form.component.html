<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-3">
                <div class="card-header bg-white py-3 border-0">
                    <h2 class="h4 fw-bold mb-0">
                        {{ type() === 'inflow' ? 'Registrar Ingreso de Efectivo' : 'Registrar Egreso de Efectivo' }}
                    </h2>
                </div>
                <div class="card-body p-4">
                    <form [formGroup]="movementForm" (ngSubmit)="onSubmit()">
                        
                        <div *ngIf="errorMessage()" class="alert alert-danger mb-4">
                            {{ errorMessage() }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase text-muted">Monto (S/)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">S/</span>
                                <input type="number" formControlName="amount" class="form-control border-start-0 ps-0" 
                                       [ngClass]="{'is-invalid': movementForm.get('amount')?.touched && movementForm.get('amount')?.invalid}"
                                       placeholder="0.00" step="0.01">
                            </div>
                            <div class="invalid-feedback d-block" *ngIf="movementForm.get('amount')?.touched && movementForm.get('amount')?.invalid">
                                El monto debe ser mayor a 0.
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase text-muted">Concepto</label>
                            <div class="d-flex gap-2">
                                <select formControlName="conceptId" class="form-select flex-grow-1"
                                        [ngClass]="{'is-invalid': movementForm.get('conceptId')?.touched && movementForm.get('conceptId')?.invalid}">
                                    <option [ngValue]="null" disabled>Seleccione un concepto...</option>
                                    <option *ngFor="let concept of concepts()" [ngValue]="concept.id">
                                        {{ concept.name }}
                                    </option>
                                </select>
                                <button type="button" class="btn btn-outline-primary px-3" (click)="addConcept()" title="Agregar nuevo concepto">
                                    +
                                </button>
                            </div>
                            <div class="text-danger small mt-1" *ngIf="movementForm.get('conceptId')?.touched && movementForm.get('conceptId')?.invalid">
                                El concepto es obligatorio.
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase text-muted">Referencia (Opcional)</label>
                            <input type="text" formControlName="reference" class="form-control" 
                                   placeholder="Ej: Nro. de comprobante, Recibo, etc.">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-uppercase text-muted">Descripción / Motivo</label>
                            <textarea formControlName="description" class="form-control" rows="3"
                                      [ngClass]="{'is-invalid': movementForm.get('description')?.touched && movementForm.get('description')?.invalid}"
                                      placeholder="Ej. Saldo rotativo inicial, pago de servicios, etc."></textarea>
                            <div class="invalid-feedback" *ngIf="movementForm.get('description')?.touched && movementForm.get('description')?.invalid">
                                La descripción es obligatoria.
                            </div>
                        </div>

                        <div class="d-flex gap-3 justify-content-end mt-4">
                            <button type="button" class="btn btn-outline-secondary px-4" routerLink="/cash" [disabled]="isLoading()">
                                Cancelar
                            </button>
                            <button type="submit" class="btn px-4 fw-bold" 
                                    [ngClass]="type() === 'inflow' ? 'btn-success' : 'btn-danger'" 
                                    [disabled]="isLoading()">
                                <span *ngIf="isLoading()" class="spinner-border spinner-border-sm me-2"></span>
                                {{ type() === 'inflow' ? 'Confirmar Ingreso' : 'Confirmar Egreso' }}
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="pos-container bg-body-tertiary min-vh-100 d-flex flex-column">

    <!-- Alert toast -->
    <div *ngIf="alertMessage" class="alert alert-dismissible fade show fixed-top m-3 shadow-sm rounded-4"
        [ngClass]="'alert-' + alertType" role="alert" style="z-index: 1080; max-width: 400px; left: auto; right: 20px;">
        <div class="d-flex align-items-center">
            <i class="bi fs-4"
                [ngClass]="alertType === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-triangle-fill text-danger'"></i>
            <div class="ms-3">
                <strong class="d-block mb-1">{{ alertTitle }}</strong>
                <small class="mb-0">{{ alertMessage }}</small>
            </div>
            <button type="button" class="btn-close ms-auto" (click)="closeAlert()"></button>
        </div>
    </div>

    <div class="bg-white shadow-sm z-1">
        <app-module-header title="Punto de Venta" iconClass="bi-cart"></app-module-header>
    </div>

    <div class="container-fluid px-3 px-xl-4 py-4 flex-grow-1 d-flex flex-column">
        <div class="row g-4 flex-grow-1">

            <!-- Product grid panel -->
            <div class="col-lg-7 col-xl-8 d-flex flex-column gap-3">

                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-2">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-transparent border-0 text-primary ps-3">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" class="form-control border-0 shadow-none bg-transparent"
                                placeholder="Buscar producto por nombre o código..." [(ngModel)]="productSearchTerm"
                                (input)="onProductSearch()" (keyup.enter)="onProductSearch()">
                        </div>
                    </div>
                </div>

                <app-card-grid [products]="filteredProducts()" [isLoading]="isLoading()"
                    (productClick)="openUnitSelector($any($event))">
                </app-card-grid>

            </div>

            <!-- Checkout panel -->
            <div class="col-lg-5 col-xl-4">
                <app-checkout-panel [cart]="cart" [customers]="customers" [isLoading]="isLoading"
                    (onProcessSale)="onProcessSale($event)" (onClearCart)="cart.set([])"
                    (onAddCustomer)="showCustomerModal.set(true)">
                </app-checkout-panel>
            </div>

            <!-- Modal: New Customer -->
            <app-modal-generic [isVisible]="showCustomerModal()" title="Nuevo Cliente" size="lg"
                (close)="closeCustomerModal()">
                <app-customer-form [isModal]="true" (saveSuccess)="onCustomerSaveSuccess()"
                    (cancel)="closeCustomerModal()">
                </app-customer-form>
            </app-modal-generic>

        </div>
    </div>
</div>

<!-- ======================================================= -->
<!-- Unit Selector Modal (inline, no separate component)     -->
<!-- ======================================================= -->
<div class="unit-modal-backdrop" *ngIf="showUnitModal()" (click)="closeUnitModal()">
    <div class="unit-modal-panel" (click)="$event.stopPropagation()">

        <!-- Header -->
        <div class="unit-modal-header">
            <div>
                <h6 class="fw-bold mb-0">{{ unitModalProduct()?.tradeName }}</h6>
                <small class="text-muted">Selecciona la unidad de venta</small>
            </div>
            <button class="btn btn-sm btn-light rounded-circle p-1 lh-1" (click)="closeUnitModal()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <!-- Lot & expiry info -->
        <div class="unit-modal-lot" *ngIf="unitModalProduct()?.lotCode">
            <i class="bi bi-tag-fill me-1 text-primary opacity-75"></i>
            Lote <strong>{{ unitModalProduct()?.lotCode }}</strong>
            &nbsp;·&nbsp;
            <i class="bi bi-calendar-event me-1 opacity-75"></i>
            Vence: <strong>{{ unitModalProduct()?.expirationDate | date:'dd/MM/yyyy' }}</strong>
            &nbsp;·&nbsp;
            Stock base: <strong>{{ unitModalProduct()?.stock }} uds</strong>
        </div>

        <!-- Unit cards -->
        <div class="unit-cards-grid">
            <button class="unit-card"
                *ngFor="let unit of availableUnits()"
                (click)="selectUnit(unit)">

                <!-- Unit name badge -->
                <div class="unit-card-name">
                    <i class="bi bi-box-seam me-1"></i>{{ unit.unitName }}
                    <span class="unit-factor-badge" *ngIf="unit.factor > 1">×{{ unit.factor }}</span>
                </div>

                <!-- Price -->
                <div class="unit-card-price">
                    S/ {{ unit.salesPrice | number:'1.2-2' }}
                </div>

                <!-- Stock breakdown -->
                <div class="unit-card-stock">
                    <ng-container *ngIf="unit.factor === 1">
                        <i class="bi bi-layers me-1"></i>
                        <span>{{ unit.stock }} disponibles</span>
                    </ng-container>
                    <ng-container *ngIf="unit.factor > 1">
                        <i class="bi bi-layers me-1"></i>
                        <span>{{ getStockBreakdown(unit.stock, unit.factor).fullPacks }} {{ unit.unitName }} completos</span>
                        <span class="unit-remainder" *ngIf="getStockBreakdown(unit.stock, unit.factor).remainder > 0">
                            + {{ getStockBreakdown(unit.stock, unit.factor).remainder }} sueltas
                        </span>
                    </ng-container>
                </div>

                <!-- Equivalence hint -->
                <div class="unit-card-equiv" *ngIf="unit.factor > 1">
                    1 {{ unit.unitName }} = {{ unit.factor }} unidades base
                </div>
            </button>
        </div>

    </div>
</div>

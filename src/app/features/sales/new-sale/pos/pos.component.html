<div class="pos-container bg-body-tertiary min-vh-100 d-flex flex-column">

    <div *ngIf="alertMessage" class="alert alert-dismissible fade show fixed-top m-3 shadow-sm rounded-4"
        [ngClass]="'alert-' + alertType" role="alert" style="z-index: 1080; max-width: 400px; left: auto; right: 20px;">
        <div class="d-flex align-items-center">
            <i class="bi fs-4"
                [ngClass]="alertType === 'success' ? 'bi-check-circle-fill text-success' : 'bi-exclamation-triangle-fill text-danger'"></i>
            <div class="ms-3">
                <strong class="d-block mb-1">{{ alertTitle }}</strong>
                <small class="mb-0">{{ alertMessage }}</small>
            </div>
            <button type="button" class="btn-close ms-auto" (click)="closeAlert()"></button>
        </div>
    </div>

    <div class="bg-white shadow-sm z-1">
        <app-module-header title="Punto de Venta" iconClass="bi-cart"></app-module-header>
    </div>

    <div class="container-fluid px-3 px-xl-4 py-4 flex-grow-1 d-flex flex-column">
        <div class="row g-4 flex-grow-1">

            <div class="col-lg-7 col-xl-8 d-flex flex-column gap-3">

                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-2">
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-transparent border-0 text-primary ps-3">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" class="form-control border-0 shadow-none bg-transparent"
                                placeholder="Buscar producto por nombre o código..." [(ngModel)]="productSearchTerm"
                                (input)="onProductSearch()" (keyup.enter)="onProductSearch()">
                        </div>
                    </div>
                </div>

                <app-card-grid [products]="filteredProducts()" [isLoading]="isLoading()"
                    (productClick)="addToCart($any($event))">
                </app-card-grid>

            </div>

            <div class="col-lg-5 col-xl-4">
                <app-checkout-panel [cart]="cart" [customers]="customers" [isLoading]="isLoading"
                    (onProcessSale)="onProcessSale($event)" (onClearCart)="cart.set([])"
                    (onAddCustomer)="showCustomerModal.set(true)">
                </app-checkout-panel>
            </div>

            <!-- Modal para Nuevo Cliente -->
            <app-modal-generic [isVisible]="showCustomerModal()" title="Nuevo Cliente" size="lg"
                (close)="closeCustomerModal()">
                <app-customer-form [isModal]="true" (saveSuccess)="onCustomerSaveSuccess()"
                    (cancel)="closeCustomerModal()">
                </app-customer-form>
            </app-modal-generic>

        </div>
    </div>
</div>

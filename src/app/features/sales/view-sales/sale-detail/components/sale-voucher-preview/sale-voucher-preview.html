<div class="flex-grow-1 d-flex justify-content-center overflow-auto position-relative pb-3">
    <!-- Loading Spinner -->
    <div *ngIf="!sale" class="position-absolute top-50 start-50 translate-middle text-center">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted small">Cargando comprobante...</p>
    </div>

    <div *ngIf="sale" class="voucher-card shadow-sm" [ngClass]="{
             'voucher-a4': selectedFormat === 'A4',
             'voucher-ticket': selectedFormat === 'TICKET',
             'voucher-80mm': selectedFormat === '80MM'
           }">

        <app-voucher-a4 *ngIf="selectedFormat === 'A4'" [sale]="sale"></app-voucher-a4>
        <app-voucher-80mm *ngIf="selectedFormat === '80MM'" [sale]="sale"></app-voucher-80mm>
        <app-voucher-ticket *ngIf="selectedFormat === 'TICKET'" [sale]="sale"></app-voucher-ticket>

    </div>
</div>

<div class="payment-form" *ngIf="selectedReceivable">
    <div class="premium-summary-card success-card mb-4">
        <div class="client-info">
            <div class="avatar-circle text-success">
                <i class="bi bi-cash-coin"></i>
            </div>
            <div class="details">
                <h6>Cobro a Cliente</h6>
                <h4>{{ selectedReceivable.customerName }}</h4>
            </div>
        </div>
        <div class="amount-info success-amount">
            <h6 class="text-success">Saldo Pendiente</h6>
            <h2>S/ {{ selectedReceivable.pendingBalance | number:'1.2-2' }}</h2>
        </div>
    </div>

    <div class="form-group mb-3">
        <label class="form-label fw-bold">Monto a Cobrar (S/)</label>
        <input type="number" class="form-control" [ngModel]="paymentAmount()"
            (ngModelChange)="paymentAmount.set($event)" placeholder="0.00" min="0.01"
            [max]="selectedReceivable.pendingBalance || 0">
    </div>

    <div class="form-group mb-3">
        <label class="form-label fw-bold">Método de Cobro</label>
        <select class="form-select" [ngModel]="paymentMethod()" (ngModelChange)="paymentMethod.set($event)">
            <option *ngFor="let method of paymentMethods" [value]="method">{{ method }}</option>
        </select>
    </div>

    <div class="form-group mb-3">
        <label class="form-label fw-bold">Referencia (Opcional)</label>
        <input type="text" class="form-control" [ngModel]="paymentReference()"
            (ngModelChange)="paymentReference.set($event)"
            placeholder="Ej. Número de operación o transferencia">
    </div>

    <div class="form-group mb-3">
        <label class="form-label fw-bold">Notas (Opcional)</label>
        <textarea class="form-control" [ngModel]="paymentNotes()" (ngModelChange)="paymentNotes.set($event)"
            rows="2" placeholder="Observaciones adicionales..."></textarea>
    </div>

    <div class="d-flex justify-content-end gap-2 mt-4">
        <button type="button" class="btn btn-light rounded-pill px-4" (click)="closePaymentModal()">
            Cancelar
        </button>
        <button type="button" class="btn btn-success rounded-pill px-4"
            [disabled]="isPaying() || !paymentAmount() || paymentAmount()! <= 0 || paymentAmount()! > (selectedReceivable.pendingBalance || 0)"
            (click)="processPayment()">
            <i class="bi" [ngClass]="isPaying() ? 'bi-hourglass-split' : 'bi-check-circle'"></i>
            {{ isPaying() ? 'Procesando...' : 'Confirmar Cobro' }}
        </button>
    </div>
</div>

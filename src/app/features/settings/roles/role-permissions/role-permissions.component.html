<div class="role-permissions-container container-fluid py-3 animate-fade-in">

    <!-- Save Row -->
    <div class="d-flex justify-content-end mb-3">
        <button type="button" class="btn btn-custom-primary px-4" (click)="onSave()" [disabled]="isSaving()">
            <span *ngIf="!isSaving()">Guardar Cambios</span>
            <span *ngIf="isSaving()">
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Guardando...
            </span>
        </button>
    </div>

    <div class="row g-4">


        <!-- Left: Role Info Card -->
        <div class="col-12 col-lg-4" *ngIf="!isLoading()">
            <app-role-info-card [role]="role()" [roleName]="roleName">
            </app-role-info-card>
        </div>

        <!-- Right: Permissions List -->
        <div class="col-12 col-lg-8">
            <app-permissions-list [modules]="modules()" [groupedPermissions]="groupedPermissions()"
                [selectedPermissions]="selectedPermissions()" [expandedModules]="expandedModules()"
                [isLoading]="isLoading()" [isSaving]="isSaving()" [showActions]="!roleId"
                (toggleModuleExpand)="onToggleModuleExpand($event)" (toggleModuleSelect)="onToggleModuleSelect($event)"
                (togglePermission)="onTogglePermission($event)" (save)="onSave()" (cancel)="onCancel()">
            </app-permissions-list>
        </div>

    </div>

</div>

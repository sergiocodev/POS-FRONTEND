<div class="roles-list-container animate-fade-in position-relative" style="padding: 24px;">

    <div class="d-flex justify-content-end align-items-center mb-4">
        <button class="btn btn-primary shadow-sm" (click)="createRole()">
            <i class="bi bi-plus-lg me-1"></i> Nuevo Rol
        </button>
    </div>


    <div class="card border-0 shadow-sm overflow-hidden">
        <app-custom-table [columns]="cols" [data]="filteredRoles()" [pageSize]="pageSize"
            (onAction)="handleTableAction($event)">
        </app-custom-table>

        <div *ngIf="isLoading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
        </div>
    </div>

</div>

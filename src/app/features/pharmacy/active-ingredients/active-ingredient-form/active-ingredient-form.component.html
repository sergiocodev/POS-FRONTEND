<div class="active-ingredient-form animate-fade-in p-4">

    <div *ngIf="isLoading()" class="d-flex justify-content-center py-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
    </div>

    <ng-container *ngIf="!isLoading()">
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="card border-0 shadow-sm h-100 mb-4">
                <div class="card-body px-4 pb-4">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="name" class="form-label fw-semibold">
                                Nombre <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" id="name" formControlName="name"
                                [class.is-invalid]="isFieldInvalid('name')" placeholder="Ej: Paracetamol">
                            <div *ngIf="isFieldInvalid('name')" class="invalid-feedback">
                                {{ getFieldError('name') }}
                            </div>
                        </div>

                        <div class="col-12">
                            <label for="description" class="form-label fw-semibold">Descripción</label>
                            <textarea class="form-control" id="description" formControlName="description" rows="3"
                                [class.is-invalid]="isFieldInvalid('description')"
                                placeholder="Descripción del principio activo"></textarea>
                            <div *ngIf="isFieldInvalid('description')" class="invalid-feedback">
                                {{ getFieldError('description') }}
                            </div>
                        </div>


                    </div>
                </div>
            </div>

            <div class="card border-0 mt-4 shadow-sm">
                <div class="card-body d-flex justify-content-end gap-2">
                    <button type="button" class="btn btn-outline-secondary" (click)="onCancel()"
                        [disabled]="isSaving()">
                        <i class="bi bi-x-circle me-1"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-primary px-4" [disabled]="isSaving()">
                        <span *ngIf="isSaving()" class="spinner-border spinner-border-sm me-1" role="status"
                            aria-hidden="true"></span>
                        <i *ngIf="!isSaving()" class="bi bi-save me-1"></i>
                        {{ isEditMode() ? 'Guardar Cambios' : 'Registrar Principio Activo' }}
                    </button>
                </div>
            </div>

        </form>
    </ng-container>

</div>

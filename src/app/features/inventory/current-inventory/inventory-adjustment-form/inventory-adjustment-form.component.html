<div class="inventory-adjustment-container">
    <form [formGroup]="adjustmentForm" (ngSubmit)="onSubmit()">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">Producto</label>
                <input type="text" class="form-control" [value]="inventoryItem?.productName" disabled>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Lote</label>
                <input type="text" class="form-control" [value]="inventoryItem?.lotCode" disabled>
            </div>

            <div class="col-md-4">
                <label class="form-label fw-bold">Cantidad Actual</label>
                <input type="number" class="form-control" formControlName="quantity"
                    [class.is-invalid]="adjustmentForm.get('quantity')?.touched && adjustmentForm.get('quantity')?.invalid">
                <div class="invalid-feedback">Ingrese una cantidad válida</div>
            </div>

            <div class="col-md-4">
                <label class="form-label fw-bold">Precio Costo</label>
                <div class="input-group">
                    <span class="input-group-text">S/</span>
                    <input type="number" class="form-control" formControlName="costPrice" step="0.01">
                </div>
            </div>

            <div class="col-md-4">
                <label class="form-label fw-bold">Precio Venta</label>
                <div class="input-group">
                    <span class="input-group-text">S/</span>
                    <input type="number" class="form-control" formControlName="salesPrice" step="0.01">
                </div>
            </div>

            <div class="col-12">
                <label class="form-label fw-bold">Tipo de Ajuste</label>
                <select class="form-select" formControlName="movementType">
                    <option *ngFor="let type of movementTypes" [value]="type.value">{{ type.label }}</option>
                </select>
            </div>

            <div class="col-12">
                <label class="form-label fw-bold">Observaciones</label>
                <textarea class="form-control" formControlName="notes" rows="2"
                    placeholder="Especifique el motivo del ajuste..."></textarea>
            </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
            <button type="button" class="btn btn-outline-secondary px-4" (click)="onCancel()">Cancelar</button>
            <button type="submit" class="btn btn-primary px-4" [disabled]="adjustmentForm.invalid || isSaving()">
                @if (isSaving()) {
                <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>
                Guardando...
                } @else {
                Confirmar Ajuste
                }
            </button>
        </div>
    </form>
</div>

<div class="inventory-list-container container-fluid py-4 animate-fade-in position-relative">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="mb-0 text-dark fw-bold">Lista de Stock</h4>
        <button class="btn btn-outline-success shadow-sm" (click)="onExport()">
            <i class="bi bi-file-earmark-excel me-1"></i> Exportar
        </button>
    </div>

    <app-table-filter [(searchQuery)]="searchTerm" [placeholder]="'Buscar por producto o lote...'"
        [disableClear]="!searchTerm()" (searchQueryChange)="applyLocalFilters()" (clear)="resetFilters()">
    </app-table-filter>

    <ng-template #productTemplate let-row>
        <div class="fw-bold text-dark">{{ row.productName }}</div>
    </ng-template>

    <ng-template #lotTemplate let-row>
        <span class="badge bg-light text-dark border">{{ row.lotCode }}</span>
    </ng-template>

    <ng-template #quantityTemplate let-row>
        <span class="fw-bold" [class.text-danger]="row.quantity <= 10">
            {{ row.quantity }}
        </span>
    </ng-template>

    <ng-template #actionsTemplate let-row>
        <div class="d-flex justify-content-end w-100 pe-4">
            <button class="btn btn-sm btn-outline-primary" (click)="onAdjust(row)" title="Ajustar Stock">
                <i class="bi bi-pencil-square me-1"></i> Ajustar
            </button>
        </div>
    </ng-template>

    <div class="card shadow-sm border-0 overflow-hidden">
        <app-custom-table [data]="filteredInventory()" [columns]="columns" [pageSize]="10">
        </app-custom-table>

        @if (isLoading) {
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted">Cargando inventario...</p>
        </div>
        }
    </div>
</div>

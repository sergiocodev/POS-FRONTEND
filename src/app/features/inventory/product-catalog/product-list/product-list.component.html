<div class="product-list-container animate-fade-in position-relative">

    <div class="d-flex justify-content-end mb-3">
        <button class="btn btn-custom-primary" (click)="onNew()">
            <i class="bi bi-plus-lg me-1"></i>
            <span class="btn-text">Nuevo Producto</span>
        </button>
    </div>



    <ng-template #codeTemplate let-row>
        <div class="d-flex flex-column" style="line-height: 1.2;">
            <small class="text-muted fw-semibold">{{ row.code }}</small>
            @if (row.digemidCode) {
            <small class="text-info fw-bold">{{ row.digemidCode }}</small>
            }
        </div>
    </ng-template>

    <ng-template #productInfoTemplate let-row>
        <div class="d-flex align-items-center py-2">
            <div class="me-3 border rounded bg-light d-flex align-items-center justify-content-center flex-shrink-0"
                style="width: 80px; height: 80px; overflow: hidden;">
                @if (row.imageUrl) {
                <img [src]="row.imageUrl" class="img-fluid w-100 h-100 object-fit-cover"
                    (error)="$any($event.target).style.display = 'none'">
                } @else {
                <i class="bi bi-image text-muted fs-5"></i>
                }
            </div>

            <div class="d-flex flex-column">
                <div class="fw-bold text-dark lh-sm">{{ row.tradeName }}</div>
                <div class="small lh-sm">
                    @if (row.genericName) {
                    <span class="text-info fw-semibold">({{ row.genericName }})</span>
                    }
                    <span class="text-muted d-block text-truncate" style="max-width: 250px;">{{ row.description
                        }}</span>
                </div>
                <div class="d-flex flex-wrap gap-1 mt-1">
                    <span *ngFor="let badge of getProductBadges(row)" class="badge rounded-1 fw-normal"
                        [ngClass]="badge.class" style="font-size: 0.7rem;">
                        {{ badge.label }}
                    </span>
                </div>
            </div>
        </div>
    </ng-template>

    <div class="card shadow-sm border-0 overflow-hidden">
        <app-custom-table [columns]="columns" [data]="products()" [pageSize]="pageSize()"
            [totalElements]="totalElements()" [currentPage]="currentPage() + 1" (onAction)="handleTableAction($event)"
            (onToggle)="handleTableToggle($event)" (onPageChange)="handlePageChange($event)"
            (onPageSizeChange)="handlePageSizeChange($event)" (onFilterChange)="handleFilterChange($event)">
        </app-custom-table>

        @if (isLoading()) {
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted">Cargando...</p>
        </div>
        }
    </div>
</div>

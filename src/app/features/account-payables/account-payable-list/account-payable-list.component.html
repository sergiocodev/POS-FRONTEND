<app-modal-alert></app-modal-alert>
<app-module-header title="Cuentas por Pagar" iconClass="bi bi-wallet2"></app-module-header>

<div class="d-flex justify-content-end px-3 mb-2">
    <button class="btn btn-outline-primary rounded-pill" routerLink="/account-payables/history">
        <i class="bi bi-clock-history"></i> Ver Historial de Pagos
    </button>
</div>

<div class="account-payable-page animate-fade-in">
    <div class="card shadow-sm border-0">
        <div class="card-body">
            <app-custom-table [columns]="columns" [data]="payables()" [pageSize]="10" (onAction)="onAction($event)">
            </app-custom-table>

            <div *ngIf="isLoading()" class="d-flex justify-content-center my-4">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para Pagar -->
    <app-modal-generic [isVisible]="showPaymentModal()" title="Registrar Pago" size="md" (close)="closePaymentModal()">

        <div class="payment-form" *ngIf="selectedPayable()">
            <div class="alert alert-info border-0 rounded-3">
                <strong>Proveedor:</strong> {{ selectedPayable()?.supplierName }}<br>
                <strong>Saldo Pendiente:</strong> S/ {{ selectedPayable()?.pendingBalance | number:'1.2-2' }}
            </div>

            <div class="form-group mb-3">
                <label class="form-label fw-bold">Monto a Pagar (S/)</label>
                <input type="number" class="form-control" [ngModel]="paymentAmount()" (ngModelChange)="paymentAmount.set($event)" placeholder="0.00"
                    min="0.01" [max]="selectedPayable()?.pendingBalance || 0">
            </div>

            <div class="form-group mb-3">
                <label class="form-label fw-bold">Método de Pago</label>
                <select class="form-select" [ngModel]="paymentMethod()" (ngModelChange)="paymentMethod.set($event)">
                    <option *ngFor="let method of paymentMethods" [value]="method">{{ method }}</option>
                </select>
            </div>

            <div class="form-group mb-3">
                <label class="form-label fw-bold">Referencia (Opcional)</label>
                <input type="text" class="form-control" [ngModel]="paymentReference()" (ngModelChange)="paymentReference.set($event)" placeholder="Ej. Número de operación">
            </div>

            <div class="form-group mb-3">
                <label class="form-label fw-bold">Notas (Opcional)</label>
                <textarea class="form-control" [ngModel]="paymentNotes()" (ngModelChange)="paymentNotes.set($event)" rows="2" placeholder="Observaciones adicionales..."></textarea>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
                <button type="button" class="btn btn-light rounded-pill px-4" (click)="closePaymentModal()">
                    Cancelar
                </button>
                <button type="button" class="btn btn-primary rounded-pill px-4"
                    [disabled]="isPaying() || !paymentAmount() || paymentAmount()! <= 0 || paymentAmount()! > (selectedPayable()?.pendingBalance || 0)"
                    (click)="processPayment()">
                    <i class="bi" [ngClass]="isPaying() ? 'bi-hourglass-split' : 'bi-check-circle'"></i>
                    {{ isPaying() ? 'Procesando...' : 'Confirmar Pago' }}
                </button>
            </div>
        </div>

    </app-modal-generic>
</div>
